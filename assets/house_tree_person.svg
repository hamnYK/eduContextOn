<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <!-- 디자인 표준 색상 토큰 반영 그라데이션 -->
    <linearGradient id="htp-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1F36" />
      <stop offset="50%" stop-color="#76453B" />
      <stop offset="100%" stop-color="#E8613A" />
    </linearGradient>
    
    <!-- 반투명 채우기용 그라데이션 -->
    <linearGradient id="htp-fill-navy" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1F36" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#1A1F36" stop-opacity="0.01" />
    </linearGradient>
    <linearGradient id="htp-fill-coral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8613A" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#E8613A" stop-opacity="0.02" />
    </linearGradient>

    <!-- 하드웨어 가속 기반 CSS 마이크로 애니메이션 -->
    <style>
      /* 1. 굴뚝 연기 플로팅 효과 */
      @keyframes float-smoke-1 {
        0% { transform: translateY(0px) scale(0.8); opacity: 0; }
        50% { opacity: 0.7; }
        100% { transform: translateY(-18px) scale(1.3); opacity: 0; }
      }
      @keyframes float-smoke-2 {
        0% { transform: translateY(0px) scale(0.8); opacity: 0; }
        50% { opacity: 0.5; }
        100% { transform: translateY(-22px) scale(1.4); opacity: 0; }
      }
      @keyframes float-smoke-3 {
        0% { transform: translateY(0px) scale(0.8); opacity: 0; }
        50% { opacity: 0.3; }
        100% { transform: translateY(-26px) scale(1.5); opacity: 0; }
      }
      .smoke-1 {
        animation: float-smoke-1 3s infinite ease-in-out;
        transform-origin: 227px 70px;
      }
      .smoke-2 {
        animation: float-smoke-2 3.5s infinite ease-in-out 1s;
        transform-origin: 232px 62px;
      }
      .smoke-3 {
        animation: float-smoke-3 4s infinite ease-in-out 2s;
        transform-origin: 229px 52px;
      }

      /* 2. 나무 잎사귀 미풍 흔들림 효과 */
      @keyframes sway-tree {
        0%, 100% { transform: rotate(0deg); }
        50% { transform: rotate(1.5deg); }
      }
      .tree-leaves {
        animation: sway-tree 6s infinite ease-in-out;
        transform-origin: 100px 250px;
      }

      /* 3. 생각/매개 노드 펄스 효과 */
      @keyframes pulse-ring {
        0% { transform: scale(0.7); opacity: 0.6; }
        100% { transform: scale(1.4); opacity: 0; }
      }
      @keyframes float-thought {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-3px); }
      }
      .thought-pulse {
        animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
        transform-origin: 300px 182px;
      }
      .thought-orb {
        animation: float-thought 4s infinite ease-in-out;
        transform-origin: 300px 182px;
      }
      .center-pulse {
        animation: pulse-ring 2.5s infinite ease-in-out;
        transform-origin: 200px 250px;
      }

      /* 4. 삼각 관계 온톨로지 점선 흐름 효과 */
      @keyframes dash-flow {
        to {
          stroke-dashoffset: -20;
        }
      }
      .flow-line {
        animation: dash-flow 1.5s infinite linear;
      }
    </style>
  </defs>

  <!-- 0. 삼각 관계 연결선 (온톨로지 링크) -->
  <g stroke="url(#htp-gradient)" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.35">
    <line class="flow-line" x1="200" y1="120" x2="100" y2="230" />
    <line class="flow-line" x1="200" y1="120" x2="300" y2="230" />
    <line class="flow-line" x1="120" y1="250" x2="280" y2="250" />
  </g>

  <!-- 0-1. 연결선 상의 매개 노드 (Flow Nodes) -->
  <!-- 나무와 사람 사이 (중앙 가로선) -->
  <g fill="url(#htp-gradient)" opacity="0.8">
    <circle cx="170" cy="250" r="3" />
    <circle cx="200" cy="250" r="5" />
    <circle class="center-pulse" cx="200" cy="250" r="9" stroke="url(#htp-gradient)" stroke-width="1" fill="none" />
    <circle cx="230" cy="250" r="3" />
  </g>
  <!-- 집과 나무 사이 (사선) -->
  <circle cx="150" cy="185" r="3" fill="url(#htp-gradient)" opacity="0.8" />
  <!-- 집과 사람 사이 (사선) -->
  <circle cx="250" cy="185" r="3" fill="url(#htp-gradient)" opacity="0.8" />

  <!-- 1. 집 (House) : 상단 중앙 (x=160~240, y=70~150) -->
  <g class="house" stroke="url(#htp-gradient)" stroke-width="2">
    <!-- 굴뚝 -->
    <rect x="222" y="80" width="10" height="20" fill="url(#htp-fill-navy)" />
    <!-- 연기 방울들 (애니메이션 적용) -->
    <circle class="smoke-1" cx="227" cy="70" r="3" fill="url(#htp-gradient)" />
    <circle class="smoke-2" cx="232" cy="62" r="4.5" fill="url(#htp-gradient)" />
    <circle class="smoke-3" cx="229" cy="52" r="6" fill="url(#htp-gradient)" />
    
    <!-- 지붕 (기하학적 선 패턴 가미) -->
    <path d="M 160 110 L 200 70 L 240 110 Z" fill="url(#htp-fill-coral)" />
    <line x1="180" y1="90" x2="220" y2="90" opacity="0.3" />
    <line x1="170" y1="100" x2="230" y2="100" opacity="0.3" />
    
    <!-- 벽 -->
    <rect x="170" y="110" width="60" height="40" fill="url(#htp-fill-navy)" />
    <!-- 격자 창문 2개 -->
    <g opacity="0.85">
      <rect x="178" y="118" width="14" height="14" />
      <line x1="185" y1="118" x2="185" y2="132" />
      <line x1="178" y1="125" x2="192" y2="125" />
      
      <rect x="208" y="118" width="14" height="14" />
      <line x1="215" y1="118" x2="215" y2="132" />
      <line x1="208" y1="125" x2="222" y2="125" />
    </g>
    
    <!-- 문 및 손잡이 -->
    <rect x="190" y="125" width="20" height="25" fill="url(#htp-fill-coral)" />
    <circle cx="194" cy="137" r="1.5" fill="url(#htp-gradient)" />
    
    <!-- 계단/기단 -->
    <path d="M 165 150 L 235 150 M 172 153 L 228 153" opacity="0.7" />
  </g>

  <!-- 2. 나무 (Tree) : 하단 좌측 (x=60~140, y=210~290) -->
  <g class="tree" stroke="url(#htp-gradient)" stroke-width="2">
    <!-- 나무 줄기 -->
    <rect x="97" y="255" width="6" height="35" fill="url(#htp-fill-navy)" />
    <!-- 잔가지 분기 -->
    <path d="M 97 265 L 87 257 M 103 260 L 113 252 M 97 273 L 89 268" opacity="0.8" />
    
    <!-- 다층 원형 잎사귀 레이어 (미풍에 흔들리는 sway 애니메이션 적용) -->
    <g class="tree-leaves">
      <!-- 1층 (좌) -->
      <circle cx="85" cy="230" r="18" fill="url(#htp-fill-navy)" />
      <!-- 2층 (우) -->
      <circle cx="115" cy="230" r="18" fill="url(#htp-fill-coral)" />
      <!-- 3층 (상) -->
      <circle cx="100" cy="202" r="16" fill="url(#htp-fill-navy)" />
      <!-- 4층 (상좌) -->
      <circle cx="86" cy="212" r="12" fill="url(#htp-fill-coral)" />
      <!-- 5층 (상우) -->
      <circle cx="114" cy="212" r="12" fill="url(#htp-fill-navy)" />
      <!-- 메인 중심 원 -->
      <circle cx="100" cy="225" r="22" fill="url(#htp-fill-navy)" />
    </g>
  </g>

  <!-- 3. 사람 (Person) : 하단 우측 (x=260~340, y=210~290) -->
  <g class="person" stroke="url(#htp-gradient)" stroke-width="2">
    <!-- 생각 전구 및 빛줄기 (플로팅 & 펄스 애니메이션 적용) -->
    <g class="thought-orb">
      <!-- 머리에서 전구까지의 연결선 -->
      <path d="M 300 200 L 300 196" stroke-width="1.5" stroke-dasharray="2 2" opacity="0.6" />
      
      <!-- 전구 뒤 펄스 효과 링 -->
      <circle class="thought-pulse" cx="300" cy="182" r="10" stroke="url(#htp-gradient)" stroke-width="1" fill="none" />
      
      <!-- 전구 몸체 -->
      <path d="M 293 182 A 7 7 0 1 1 307 182 L 304 192 L 296 192 Z" fill="url(#htp-fill-coral)" />
      <!-- 전구 소켓 -->
      <line x1="296" y1="194" x2="304" y2="194" stroke-width="1.5" />
      <line x1="298" y1="197" x2="302" y2="197" stroke-width="1.5" />
      
      <!-- 전구 내 필라멘트 -->
      <path d="M 299 180 L 299 185 M 297 183 L 303 183" opacity="0.7" stroke-width="1" />
      
      <!-- 빛줄기 발산선 (Glow rays) -->
      <g opacity="0.8" stroke-width="1.5">
        <line x1="300" y1="171" x2="300" y2="167" /> <!-- 위 -->
        <line x1="291" y1="175" x2="287" y2="171" /> <!-- 좌상 -->
        <line x1="309" y1="175" x2="313" y2="171" /> <!-- 우상 -->
        <line x1="289" y1="184" x2="284" y2="184" /> <!-- 좌 -->
        <line x1="311" y1="184" x2="316" y2="184" /> <!-- 우 -->
      </g>
    </g>
    
    <!-- 머리 -->
    <circle cx="300" cy="213" r="10" fill="url(#htp-fill-coral)" />
    <!-- 몸통 -->
    <path d="M 285 223 L 315 223 L 320 255 L 280 255 Z" fill="url(#htp-fill-navy)" />
    <!-- 정장/옷 깃 디테일 -->
    <path d="M 294 223 L 300 233 L 306 223" opacity="0.6" />
    
    <!-- 양팔 (왼팔 허리 거치, 오른팔 포인팅 모션) -->
    <path d="M 285 228 L 273 240 L 283 248" />
    <path d="M 315 228 L 330 233 L 340 221" />
    
    <!-- 바지/하체 형태 -->
    <rect x="284" y="255" width="10" height="25" rx="3.5" fill="url(#htp-fill-navy)" />
    <rect x="306" y="255" width="10" height="25" rx="3.5" fill="url(#htp-fill-navy)" />
    <!-- 신발/밑둥 라인 -->
    <line x1="289" y1="280" x2="279" y2="285" />
    <line x1="311" y1="280" x2="321" y2="285" />
  </g>
</svg>
