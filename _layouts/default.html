<!DOCTYPE html>
<html lang="ko">
  
  {%- include head.html -%}

  <body>
    <!-- Hamburger (mobile) -->
    <button class="hamburger" aria-label="메뉴 열기">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
    <div class="sidebar-overlay"></div>
    
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <a href="https://worflogy.com"><img src="{{ '/assets/worflogy_logo.svg' | relative_url }}" alt="워플로지"></a>
        <div class="sidebar-brand notranslate" translate="no">
          <span class="brand-ko">(주)워플로지</span>
          <span class="brand-en">Worflogy Inc.</span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a href="https://worflogy.com" class="nav-item" target="worflogy_main" rel="noopener noreferrer">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>워플로지 홈
        </a>
        <a href="#vision" class="nav-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18a3.75 3.75 0 100-7.5 3.75 3.75 0 000 7.5z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12a7.5 7.5 0 11-15 0 7.5 7.5 0 0115 0z" />
          </svg>교육 비전
        </a>
        <a href="#solutions" class="nav-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09z" />
          </svg>교육 솔루션
        </a>
        <a href="#process" class="nav-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 13.5l10.5-11.25L12 10.5h8.25L9.75 21.75 12 13.5H3.75z" />
          </svg>프로세스 · 스킬
        </a>
        <a href="#contact" class="nav-item">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75" />
          </svg>교육 문의
        </a>
      </nav>
      <div class="sidebar-footer">
        © 2026 워플로지<br />worflogy.com
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main">
      <div class="page-header">
        <div class="section-label">edu.contextonai.com</div>
        <h1 class="section-title">컨텍스톤 (Contexton)</h1>
        <p class="section-desc">AI·온톨로지 지능형 워크플로 디자인 & 솔루션 기업 워플로지의 교육용 콘텐츠 및 솔루션 브랜드입니다.</p>
      </div>

      {{ content }}
    </main>

    <!-- GTranslate -->
    <div class="gtranslate_wrapper"></div>
    <script src="{{ '/js/gtranslate-config.js' | relative_url }}"></script>
    <script src="https://cdn.gtranslate.net/widgets/latest/float.js" defer></script>

    <!-- Scripts -->
    <script src="{{ '/js/main.js' | relative_url }}"></script>
  </body>
</html>
